<form id="edit-form" class="form-horizontal" role="form" data-toggle="validator" method="POST" action="">

    <div class="form-group">
        <label class="control-label col-xs-12 col-sm-2">{:__('Title')}:</label>
        <div class="col-xs-12 col-sm-8">
            <input id="c-title" data-rule="required" class="form-control" name="row[title]" type="text" value="{$row.title|htmlentities}">
        </div>
    </div>
        <div class="form-group">
        <label for="c-type" class="control-label col-xs-12 col-sm-2">{:__('Type')}:</label>
        <div class="col-xs-12 col-sm-8">

            <select id="c-type" data-rule="required" class="form-control selectpicker" name="row[cid]">
                {foreach name="proclass" item="vo"}
                <option value="{$key}" {in name="key" value="$row.cid"}selected{/in}>{$vo}</option>
                {/foreach}
            </select>

        </div>
    </div>
    
          
       <div class="form-group">
        <label class="control-label col-xs-12 col-sm-2">{:__('公司名称')}:</label>
        <div class="col-xs-12 col-sm-8">
            <input id="c-title" data-rule="required" class="form-control" value="{$row.corporation|htmlentities}" name="row[corporation]" type="text">
        </div>
    </div>
      
       <div class="form-group">
        <label class="control-label col-xs-12 col-sm-2">{:__('公司简介')}:</label>
        <div class="col-xs-12 col-sm-8">
            <input id="c-title" data-rule="required" class="form-control" value="{$row.corporation_dec|htmlentities}" name="row[corporation_dec]" type="text">
        </div>
    </div>
    
        
       <div class="form-group">
        <label class="control-label col-xs-12 col-sm-2">{:__('承保机构')}:</label>
        <div class="col-xs-12 col-sm-8">
            <input id="c-title" data-rule="required" class="form-control" value="{$row.underwriting|htmlentities}" name="row[underwriting]" type="text">
        </div>
    </div>
    
       <div class="form-group">
        <label class="control-label col-xs-12 col-sm-2">{:__('项目概述')}:</label>
        <div class="col-xs-12 col-sm-8">
            <input id="c-title" data-rule="required" class="form-control" value="{$row.pro_ov|htmlentities}" name="row[pro_ov]" type="text">
        </div>
    </div>
    
    
    
    <div class="form-group">
        <label class="control-label col-xs-12 col-sm-2">{:__('Introduction')}:</label>
        <div class="col-xs-12 col-sm-8">
            <input id="c-Introduction" data-rule="required" class="form-control" name="row[Introduction]" type="text" value="{$row.Introduction|htmlentities}">
        </div>
    </div>
    
    
    
     <div class="form-group">
        <label class="control-label col-xs-12 col-sm-2">{:__('多选标识')}:</label>
        <div class="col-xs-12 col-sm-8">
            <div class="checkbox">
                <label>
                    <input type="checkbox" name="row[checkbox_field][]" value="option1">增值</label>
                <label>
                    <input type="checkbox" name="row[checkbox_field][]" value="option2">红包</label>
                <label>
                    <input type="checkbox" name="row[checkbox_field][]" value="option3">新人</label>
                <label>
                    <input type="checkbox" name="row[checkbox_field][]" value="option4">会员</label>
            </div>
        </div>
    </div>

    
    <div class="form-group"  id="textoption1"  style="display:none">
        <label class="control-label col-xs-12 col-sm-2">{:__('增值%')}:</label>
        <div class="col-xs-12 col-sm-8">
            <input type="text" class="form-control" placeholder="输入增值百分比"  value="{$row.added_value|htmlentities}"   name="row[added_value]">
        </div>
    </div>
    
        
    <div class="form-group"  id="textoption2"  style="display:none">
        <label class="control-label col-xs-12 col-sm-2">{:__('最低买入')}:</label>
        <div class="col-xs-12 col-sm-8">
            <input type="text"  class="form-control" placeholder="最低买入触发金额" value="{$row.minimum_envelope|htmlentities}"  name="row[minimum_envelope]">
            <input type="text"  class="form-control" placeholder="红包赠送金额" value="{$row.envelope_money|htmlentities}" name="row[envelope_money]">
        </div>

    </div>
  
        
    <div class="form-group"  id="textoption3"  style="display:none">
        <label class="control-label col-xs-12 col-sm-2">{:__('新人标识')}:</label>
        <div class="col-xs-12 col-sm-8">
             <input id="c-scale" data-rule="required" readonly="readonly" class="form-control"name="row[is_newcomer]"  value="{$row.is_newcomer|htmlentities}" type="number">
        </div>
    </div>
    
        <div class="form-group" id="textoption4"  style="display:none">
        <label for="c-type" class="control-label col-xs-12 col-sm-2">{:__('限制会员级别')}:</label>
        <div class="col-xs-12 col-sm-8">

            <select id="c-type" data-rule="required" class="form-control selectpicker" name="row[limit_vip]">
                <option value="1">VIP1</option>
                <option value="2">VIP2</option>
                <option value="3">VIP3</option>
                <option value="4">VIP4</option>
                <option value="5">VIP5</option>
                <option value="6">VIP6</option>
                <option value="7">VIP7</option>
                
            </select>

        </div>
    </div>
    
    
    <div class="form-group">
        <label class="control-label col-xs-12 col-sm-2">{:__('Scale')}:</label>
        <div class="col-xs-12 col-sm-8">
            <input id="c-scale" data-rule="required" class="form-control" step="0.01" name="row[scale]" type="number" value="{$row.scale|htmlentities}">
        </div>
    </div>
    <div class="form-group">
        <label class="control-label col-xs-12 col-sm-2">{:__('Product_day')}:</label>
        <div class="col-xs-12 col-sm-8">
            <input id="c-product_day" data-rule="required" class="form-control" name="row[product_day]" type="number" value="{$row.product_day|htmlentities}">
        </div>
    </div>
    <div class="form-group">
        <label class="control-label col-xs-12 col-sm-2">{:__('Product_endtime')}:</label>
        <div class="col-xs-12 col-sm-8">
            <input id="c-product_endtime" data-rule="required" class="form-control datetimepicker" data-date-format="YYYY-MM-DD HH:mm:ss" data-use-current="true" name="row[product_endtime]" type="text" value="{:$row.product_endtime?datetime($row.product_endtime):''}">
        </div>
    </div>
    <div class="form-group">
        <label class="control-label col-xs-12 col-sm-2">{:__('Remaining')}:</label>
        <div class="col-xs-12 col-sm-8">
            <input id="c-remaining" data-rule="required" class="form-control" step="0.01" name="row[remaining]" type="number" value="{$row.remaining|htmlentities}">
        </div>
    </div>
    <div class="form-group">
        <label class="control-label col-xs-12 col-sm-2">{:__('Image')}:</label>
        <div class="col-xs-12 col-sm-8">
            <div class="input-group">
                <input id="c-image" data-rule="required" class="form-control" size="50" name="row[image]" type="text" value="{$row.image|htmlentities}">
                <div class="input-group-addon no-border no-padding">
                    <span><button type="button" id="faupload-image" class="btn btn-danger faupload" data-input-id="c-image" data-mimetype="image/gif,image/jpeg,image/png,image/jpg,image/bmp,image/webp" data-multiple="false" data-preview-id="p-image"><i class="fa fa-upload"></i> {:__('Upload')}</button></span>
                    <span><button type="button" id="fachoose-image" class="btn btn-primary fachoose" data-input-id="c-image" data-mimetype="image/*" data-multiple="false"><i class="fa fa-list"></i> {:__('Choose')}</button></span>
                </div>
                <span class="msg-box n-right" for="c-image"></span>
            </div>
            <ul class="row list-inline faupload-preview" id="p-image"></ul>
        </div>
    </div>
    <div class="form-group">
        <label class="control-label col-xs-12 col-sm-2">{:__('Day_income')}:</label>
        <div class="col-xs-12 col-sm-8">
            <input id="c-day_income" data-rule="required" class="form-control" step="0.01" name="row[day_income]" type="number" value="{$row.day_income|htmlentities}">
        </div>
    </div>
    <div class="form-group">
        <label class="control-label col-xs-12 col-sm-2">{:__('Content')}:</label>
        <div class="col-xs-12 col-sm-8">
            <textarea id="c-content" data-rule="required" class="form-control editor" rows="5" name="row[content]" cols="50">{$row.content|htmlentities}</textarea>
        </div>
    </div>
    <!--<div class="form-group">-->
    <!--    <label class="control-label col-xs-12 col-sm-2">{:__('Tags')}:</label>-->
    <!--    <div class="col-xs-12 col-sm-8">-->
    <!--        <input id="c-tags" data-rule="required" class="form-control" data-role="tagsinput" name="row[tags]" type="text" value="{$row.tags|htmlentities}">-->
    <!--    </div>-->
    <!--</div>-->
    <div class="form-group layer-footer">
        <label class="control-label col-xs-12 col-sm-2"></label>
        <div class="col-xs-12 col-sm-8">
            <button type="submit" class="btn btn-primary btn-embossed disabled">{:__('OK')}</button>
            <button type="reset" class="btn btn-default btn-embossed">{:__('Reset')}</button>
        </div>
    </div>
</form>
