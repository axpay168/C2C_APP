<form id="add-form" class="form-horizontal" role="form" data-toggle="validator" method="POST" action="">

    <div class="form-group">
        <label class="control-label col-xs-12 col-sm-2">{:__('Username')}:</label>
        <div class="col-xs-12 col-sm-8">
            <input id="c-username" data-rule="required" class="form-control" name="row[username]" type="text">
        </div>
    </div>
    
  
  
  
      
    <div class="form-group">
        <label for="c-pid" class="control-label col-xs-12 col-sm-2">{:__('选择语言')}:</label>
        <div class="col-xs-12 col-sm-8">

            <select id="c-pid" data-rule="required" class="form-control selectpicker" name="row[lang]">
                <option  value="chn">中国 - 人民币 (CNY)</option>
                <option  value="jpn">日本 - 日元 (JPY)</option>
                <option  value="kor">韩国 - 韩元 (KRW)</option>
                <option  value="eng">英语 - 英镑 (GBP)</option>
                <option  value="tha">泰国 - 泰铢 (THB)</option>
                <option  value="vnm">越南 - 越南盾 (VND)</option>
                <option  value="eur">欧洲 - 欧元 (EUR)</option>
                <option  value="sgp">新加坡 - 新加坡元 (SGD)</option>
                <option  value="hkg">香港 - 港元 (HKD)</option>
                <option  value="fra">法国 - 欧元 (EUR)</option>
                <option  value="ger">德国 - 欧元 (EUR)</option>
                <option  value="rus">俄罗斯 - 俄罗斯卢布 (RUB)</option>
                <option  value="ind">印度 - 印度卢比 (INR)</option>
                <option  value="mys">马来西亚 - 马来西亚林吉特 (MYR)</option>
                <option  value="ita">意大利 - 欧元 (EUR)</option>
            
         
            </select>

        </div>
    </div>
    
    

    
    <div class="form-group">
        <label class="control-label col-xs-12 col-sm-2">{:__('Danjia')}:</label>
        <div class="col-xs-12 col-sm-8">
            <input id="c-danjia" data-rule="required" class="form-control" name="row[danjia]" type="text">
        </div>
    </div>
    <div class="form-group">
        <label class="control-label col-xs-12 col-sm-2">{:__('Shuliang')}:</label>
        <div class="col-xs-12 col-sm-8">
            <input id="c-shuliang" data-rule="required" class="form-control" name="row[shuliang]" type="text">
        </div>
    </div>
    <div class="form-group">
        <label class="control-label col-xs-12 col-sm-2">{:__('Shengyu')}:</label>
        <div class="col-xs-12 col-sm-8">
            <input id="c-shengyu" data-rule="required" class="form-control" name="row[shengyu]" type="text">
        </div>
    </div>
    <div class="form-group">
        <label class="control-label col-xs-12 col-sm-2">{:__('Mine')}:</label>
        <div class="col-xs-12 col-sm-8">
            <input id="c-mine" data-rule="required" class="form-control" name="row[mine]" type="text">
        </div>
    </div>
    <div class="form-group">
        <label class="control-label col-xs-12 col-sm-2">{:__('Maxe')}:</label>
        <div class="col-xs-12 col-sm-8">
            <input id="c-maxe" data-rule="required" class="form-control" name="row[maxe]" type="text">
        </div>
    </div>
    <div class="form-group">
        <label class="control-label col-xs-12 col-sm-2">{:__('Xianren')}:</label>
        <div class="col-xs-12 col-sm-8">
            <input id="c-xianren" data-rule="required" class="form-control" name="row[xianren]" type="text">
        </div>
    </div>
    <div class="form-group">
        <label class="control-label col-xs-12 col-sm-2">{:__('Changes')}:</label>
        <div class="col-xs-12 col-sm-8">
            <input id="c-changes" data-rule="required" class="form-control" name="row[changes]" type="text">
        </div>
    </div>
    <div class="form-group">
        <label class="control-label col-xs-12 col-sm-2">{:__('Xtype')}:</label>
        <div class="col-xs-12 col-sm-8">
            <input id="c-xtype" data-rule="required" class="form-control" name="row[xtype]" type="text">
        </div>
    </div>
    <div class="form-group layer-footer">
        <label class="control-label col-xs-12 col-sm-2"></label>
        <div class="col-xs-12 col-sm-8">
            <button type="submit" class="btn btn-primary btn-embossed disabled">{:__('OK')}</button>
            <button type="reset" class="btn btn-default btn-embossed">{:__('Reset')}</button>
        </div>
    </div>
</form>
