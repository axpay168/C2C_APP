# HKEX 項目 - 通過 IP 訪問
# 複製到: /www/server/panel/vhost/nginx/hkex-ip.conf
# 測試時可將 149.104.29.96 hkex-sm.com 加入本機 hosts 以便 API 請求正確解析

server {
    listen 80;
    server_name 149.104.29.96 localhost hkex-sm.com www.hkex-sm.com;
    index index.php index.html index.htm;
    root /www/wwwroot/hkex-sm.com/public;

    include /www/server/nginx/conf/enable-php-82.conf;

    location /h5/ {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        try_files $uri $uri/ /index.php?$query_string;
    }

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        fastcgi_pass unix:/tmp/php-cgi-82.sock;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;
    }

    access_log /www/wwwlogs/hkex-ip.log;
    error_log /www/wwwlogs/hkex-ip.error.log;
}
