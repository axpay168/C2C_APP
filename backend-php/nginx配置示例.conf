# Nginx配置文件示例
# 宝塔面板路径: /www/server/panel/vhost/nginx/MXTRX.TOP.conf
# 或: /www/server/panel/vhost/nginx/你的网站ID.conf

server {
    listen 80;
    server_name MXTRX.TOP www.MXTRX.TOP;
    
    # 网站根目录 - 必须指向public目录
    root /www/wwwroot/hkex-sm.com/public;
    index index.php index.html index.htm;
    
    # 访问日志
    access_log /www/wwwlogs/MXTRX.TOP.log;
    error_log /www/wwwlogs/MXTRX.TOP.error.log;
    
    # 主要location块
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }
    
    # PHP处理
    location ~ \.php$ {
        # 根据PHP版本调整sock路径
        # PHP 8.2: /tmp/php-cgi-82.sock
        # PHP 8.1: /tmp/php-cgi-81.sock
        # PHP 7.4: /tmp/php-cgi-74.sock
        fastcgi_pass unix:/tmp/php-cgi-82.sock;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;
        fastcgi_param PATH_INFO $fastcgi_path_info;
    }
    
    # 静态文件缓存
    location ~* \.(jpg|jpeg|png|gif|ico|css|js|woff|woff2|ttf|svg)$ {
        expires 30d;
        access_log off;
    }
    
    # 禁止访问隐藏文件
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
    
    # 禁止访问特定文件
    location ~ ^/(\.user.ini|\.htaccess|\.git|\.svn|\.project|LICENSE|README.md) {
        deny all;
        access_log off;
        log_not_found off;
    }
}
