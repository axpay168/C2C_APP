# old 專案 - MXTRX.TOP Nginx 配置
# 前端 /h5/ 與後端 API 共用同一網域
# 宝塔：將此文件複製到 /www/server/panel/vhost/nginx/ 或通過宝塔網站設置 → 配置文件 貼上

server {
    listen 80;
    server_name MXTRX.TOP www.MXTRX.TOP;
    
    # 網站根目錄 - 指向 old 後端 public
    root /www/wwwroot/old/backend-php/public;
    index index.php index.html index.htm;
    
    # 前端 H5 - 靜態文件（root 下 /h5/ 目錄）
    location /h5/ {
        try_files $uri $uri/ /h5/index.html;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }
    
    # 後端 API 與 PHP
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }
    
    location ~ \.php$ {
        fastcgi_pass unix:/tmp/php-cgi-82.sock;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;
        fastcgi_param PATH_INFO $fastcgi_path_info;
    }
    
    # 靜態資源緩存
    location ~* \.(jpg|jpeg|png|gif|ico|css|js|woff|woff2|ttf|svg)$ {
        expires 30d;
        access_log off;
    }
    
    location ~ /\. {
        deny all;
    }
    
    access_log /www/wwwlogs/MXTRX.TOP.log;
    error_log /www/wwwlogs/MXTRX.TOP.error.log;
}
